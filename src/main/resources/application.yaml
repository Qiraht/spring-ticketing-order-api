spring:
  application:
    name: ticket_order

  datasource:
     url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ticket_db}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
     username: ${DB_USER:root}
     password: ${DB_PASSWORD:supersecretpassword}
     driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update # for testing purposes
    show-sql: true
    properties:
      hibernate:
        format-sql: true

  liquibase:
    enabled: false # for testing purposes
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    default-schema: ticket_db

server:
  port: ${PORT:8080}
  forward-headers-strategy: FRAMEWORK
